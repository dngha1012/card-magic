<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <title>Card Magic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
        "Apple SD Gothic Neo", sans-serif;
      color: #fff;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ===== 카메라 영상 ===== */
    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
      /* 전면 카메라 거울 모드 (마술사 시점에서 자연스럽게) */
      transform: scaleX(-1);
      z-index: 0;
    }

    /* ===== 3x3 그리드 가이드 ===== */
    .grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .grid-line {
      position: absolute;
      background: rgba(255, 255, 255, 0.28);
    }
    .grid-line.h {
      left: 0;
      right: 0;
      height: 1px;
    }
    .grid-line.v {
      top: 0;
      bottom: 0;
      width: 1px;
    }

    /* ===== 상단 바 ===== */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 16%;
      min-height: 130px;
      background: #000;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 16px 12px;
    }
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ev-text {
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.5px;
    }
    .ev-text strong {
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      margin-left: 2px;
    }
    .heif {
      background: rgba(80, 80, 80, 0.85);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
      letter-spacing: 0.6px;
    }
    .top-icons {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn.face {
      background: #f4c842;
    }
    .icon-btn svg {
      display: block;
    }
    .flash-label {
      position: absolute;
      font-size: 8px;
      font-weight: 700;
      color: #fff;
      margin-top: -10px;
      margin-left: 8px;
    }
    .flash-wrap {
      position: relative;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 영상 영역 우하단 보조 컨트롤 (f, 비율, 회전) ===== */
    .side-controls {
      position: absolute;
      right: 14px;
      bottom: calc(24% + 14px);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 8;
    }
    .side-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }

    /* ===== 자동초점 십자 표시 ===== */
    .focus-cross {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      z-index: 6;
      pointer-events: none;
      opacity: 0.6;
    }
    .focus-cross::before,
    .focus-cross::after {
      content: "";
      position: absolute;
      background: rgba(244, 200, 66, 0.85);
    }
    .focus-cross::before {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-0.5px);
    }
    .focus-cross::after {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      transform: translateY(-0.5px);
    }

    /* ===== 하단 바 ===== */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24%;
      min-height: 200px;
      background: #000;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 14px 24px 28px;
    }
    .mode-tabs {
      display: flex;
      gap: 28px;
      margin-bottom: 18px;
      font-size: 14px;
    }
    .mode-tabs .mode {
      color: #aaa;
      padding: 6px 4px;
      font-weight: 500;
    }
    .mode-tabs .mode.active {
      color: #f4c842;
      font-weight: 700;
    }
    .shutter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
    }
    .gallery {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #aaa 0%, #e0dcd2 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .shutter {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #000;
      box-shadow: 0 0 0 3px #fff;
      padding: 0;
      cursor: pointer;
    }
    .shutter:active {
      background: #ddd;
    }
    .flip {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #2a2a2a;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 상태 메시지 ===== */
    #status {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      padding: 14px 22px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 10px;
      pointer-events: none;
      max-width: 80vw;
      white-space: pre-line;
      transition: opacity 0.3s ease;
      z-index: 100;
    }
    #status.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>

  <!-- 3x3 그리드 -->
  <div class="grid">
    <div class="grid-line h" style="top: 33.33%"></div>
    <div class="grid-line h" style="top: 66.66%"></div>
    <div class="grid-line v" style="left: 33.33%"></div>
    <div class="grid-line v" style="left: 66.66%"></div>
  </div>

  <!-- 자동초점 십자 -->
  <div class="focus-cross"></div>

  <!-- 상단 바 -->
  <header class="top-bar">
    <div class="top-row">
      <div class="ev-text">EV<strong>0.0</strong></div>
      <div></div>
      <div></div>
    </div>
    <div class="top-row">
      <div class="heif">HEIF</div>
      <div class="top-icons">
        <!-- 얼굴 인식 (노란 활성 상태) -->
        <span class="icon-btn face" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="3"/>
            <path d="M6 19c1-3 3.5-4.5 6-4.5s5 1.5 6 4.5"/>
            <path d="M4 7V4h3"/>
            <path d="M20 7V4h-3"/>
            <path d="M4 17v3h3"/>
            <path d="M20 17v3h-3"/>
          </svg>
        </span>
        <!-- 야간 모드 (달) -->
        <span class="icon-btn" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </span>
        <!-- 플래시 A -->
        <span class="icon-btn flash-wrap" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <polygon points="13,2 4,14 11,14 11,22 20,10 13,10"/>
          </svg>
          <span class="flash-label">A</span>
        </span>
        <!-- 사선 그어진 원 (효과 끄기 표시) -->
        <span class="icon-btn" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"/>
            <line x1="5.5" y1="5.5" x2="18.5" y2="18.5"/>
          </svg>
        </span>
        <!-- 메뉴 (점 4개) -->
        <span class="icon-btn" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <circle cx="6" cy="6" r="2"/>
            <circle cx="18" cy="6" r="2"/>
            <circle cx="6" cy="18" r="2"/>
            <circle cx="18" cy="18" r="2"/>
          </svg>
        </span>
      </div>
    </div>
  </header>

  <!-- 영상 영역 우하단 보조 컨트롤 -->
  <div class="side-controls">
    <div class="side-btn" aria-hidden="true">
      <em style="font-family: serif; font-style: italic; font-size: 16px;">f</em>
    </div>
    <div class="side-btn" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </div>
    <div class="side-btn" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
      </svg>
    </div>
  </div>

  <!-- 하단 바 -->
  <footer class="bottom-bar">
    <div class="mode-tabs">
      <span class="mode">비디오</span>
      <span class="mode active">사진</span>
    </div>
    <div class="shutter-row">
      <div class="gallery" aria-hidden="true"></div>
      <button class="shutter" aria-label="셔터"></button>
      <button class="flip" aria-label="카메라 전환">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15.6-6.2L21 8"/>
          <polyline points="21 3 21 8 16 8"/>
          <path d="M21 12a9 9 0 0 1-15.6 6.2L3 16"/>
          <polyline points="3 21 3 16 8 16"/>
        </svg>
      </button>
    </div>
  </footer>

  <!-- 상태 메시지 -->
  <div id="status">카메라 준비 중…</div>

  <script>
    const video = document.getElementById("video");
    const statusEl = document.getElementById("status");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }

    function hideStatus() {
      statusEl.classList.add("hidden");
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showStatus("이 브라우저는 카메라 API를 지원하지 않습니다.\nSafari에서 열어주세요.");
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          audio: false,
        });

        video.srcObject = stream;

        // iOS Safari: 메타데이터 로드 후 명시적 play() 호출이 안정적
        video.onloadedmetadata = () => {
          video
            .play()
            .then(hideStatus)
            .catch((err) => {
              showStatus("영상 재생 실패\n" + (err.message || err.name));
            });
        };
      } catch (err) {
        let msg;
        switch (err.name) {
          case "NotAllowedError":
            msg = "카메라 권한이 거부되었습니다.\n설정 > Safari > 카메라에서 허용해주세요.";
            break;
          case "NotFoundError":
            msg = "카메라를 찾을 수 없습니다.";
            break;
          case "NotReadableError":
            msg = "카메라가 다른 앱에서 사용 중입니다.";
            break;
          case "OverconstrainedError":
            msg = "요청한 카메라 설정을 지원하지 않습니다.";
            break;
          default:
            msg = "카메라 오류\n" + (err.message || err.name);
        }
        showStatus(msg);
      }
    }

    startCamera();
  </script>
</body>
</html>
