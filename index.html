<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <title>Card Magic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* video는 스트림 수신 전용 — 화면 밖으로 숨김.
       이렇게 하면 iOS Safari의 미디어 컨트롤(재생/일시정지/PIP 등)이
       사용자에게 절대 표시되지 않음. */
    #video {
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* 사용자가 보는 건 canvas. 미디어 컨트롤 자체가 존재하지 않음. */
    #canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      pointer-events: none;
      max-width: 80vw;
      white-space: pre-line;
      transition: opacity 0.3s ease;
    }

    #status.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <!-- 스트림 수신 전용 (화면에 안 보임) -->
  <video id="video" autoplay playsinline muted></video>

  <!-- 실제 화면에 보이는 것 -->
  <canvas id="canvas"></canvas>

  <div id="status">카메라 준비 중…</div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }

    function hideStatus() {
      statusEl.classList.add("hidden");
    }

    // 매 프레임 video → canvas 복사 (좌우 반전 포함)
    function drawFrame() {
      if (video.readyState >= video.HAVE_CURRENT_DATA) {
        ctx.save();
        // 거울 모드: canvas 좌표계를 가로로 뒤집어서 그림
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();
      }
      requestAnimationFrame(drawFrame);
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showStatus("이 브라우저는 카메라 API를 지원하지 않습니다.\nSafari에서 열어주세요.");
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          audio: false,
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          // canvas 내부 해상도를 비디오 원본 해상도와 동일하게
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          video
            .play()
            .then(() => {
              hideStatus();
              drawFrame();
            })
            .catch((err) => {
              showStatus("영상 재생 실패\n" + (err.message || err.name));
            });
        };
      } catch (err) {
        let msg;
        switch (err.name) {
          case "NotAllowedError":
            msg = "카메라 권한이 거부되었습니다.\n설정 > Safari > 카메라에서 허용해주세요.";
            break;
          case "NotFoundError":
            msg = "카메라를 찾을 수 없습니다.";
            break;
          case "NotReadableError":
            msg = "카메라가 다른 앱에서 사용 중입니다.";
            break;
          case "OverconstrainedError":
            msg = "요청한 카메라 설정을 지원하지 않습니다.";
            break;
          default:
            msg = "카메라 오류\n" + (err.message || err.name);
        }
        showStatus(msg);
      }
    }

    startCamera();
  </script>
</body>
</html>
