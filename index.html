<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <title>Card Magic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #video {
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      pointer-events: none;
      max-width: 80vw;
      white-space: pre-line;
      transition: opacity 0.3s ease;
      z-index: 100;
    }
    #status.hidden {
      opacity: 0;
    }

    #debug {
      position: fixed;
      top: calc(env(safe-area-inset-top, 8px) + 8px);
      right: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.5;
      padding: 8px 10px;
      border-radius: 6px;
      pointer-events: none;
      z-index: 90;
      min-width: 160px;
    }
    #debug .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    #debug .label { color: #999; }
    #debug .val { color: #fff; font-weight: 600; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #debug .val.ok { color: #4caf50; }
    #debug .val.warn { color: #ffb74d; }
    #debug .val.bad { color: #ff5252; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="status">카메라 준비 중…</div>

  <div id="debug">
    <div class="row"><span class="label">상태</span><span class="val" id="dbg-state">초기화…</span></div>
    <div class="row"><span class="label">검출</span><span class="val" id="dbg-count">-</span></div>
    <div class="row"><span class="label">응답</span><span class="val" id="dbg-latency">-</span></div>
    <div class="row"><span class="label">종류</span><span class="val" id="dbg-class">-</span></div>
  </div>

  <script>
    // ===== 설정 =====
    // Universe 모델 URL: https://universe.roboflow.com/augmented-startups/playing-cards-ow27d
    // Universe 페이지의 "Versions" 탭에서 최신 버전 번호 확인 후 아래 숫자를 변경하세요.
    const ROBOFLOW_MODEL_ID = "playing-cards-ow27d";
    const ROBOFLOW_VERSION = 4;
    const DETECT_INTERVAL_MS = 350;   // 약 3 fps
    const KEEP_DETECTION_MS = 1500;   // 박스 유지 시간 (다음 응답까지)
    const DETECT_INPUT_WIDTH = 640;   // API로 보내는 이미지 다운스케일 폭
    const MIN_CONFIDENCE = 0.4;       // 이 미만 신뢰도는 무시

    // ===== DOM =====
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const dbgState = document.getElementById("dbg-state");
    const dbgCount = document.getElementById("dbg-count");
    const dbgLatency = document.getElementById("dbg-latency");
    const dbgClass = document.getElementById("dbg-class");

    // 검출 전용 hidden canvas (정방향, 다운스케일)
    const detectCanvas = document.createElement("canvas");
    const detectCtx = detectCanvas.getContext("2d");

    // ===== 상태 =====
    let apiKey = null;
    let latestDetections = [];   // [{class, confidence, box: {x, y, w, h}}]
    let lastDetectionAt = 0;
    let isCalling = false;
    let detectTimer = null;

    // ===== UI =====
    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }
    function hideStatus() {
      statusEl.classList.add("hidden");
    }
    function setDbg(el, text, cls) {
      if (!el) return;
      el.textContent = text;
      el.classList.remove("ok", "warn", "bad");
      if (cls) el.classList.add(cls);
    }

    // ===== API 키 (localStorage 보관) =====
    function loadApiKey() {
      let key = localStorage.getItem("roboflow_api_key");
      if (!key) {
        key = prompt(
          "Roboflow API 키를 입력하세요.\n" +
          "(https://app.roboflow.com → Settings → Roboflow API)"
        );
        if (key) {
          key = key.trim();
          localStorage.setItem("roboflow_api_key", key);
        }
      }
      return key;
    }
    // 디버깅용 — 콘솔에서 호출하면 키를 다시 입력 받게 함
    window.resetApiKey = () => {
      localStorage.removeItem("roboflow_api_key");
      location.reload();
    };

    // ===== 매 프레임: 거울 영상 + 검출 박스/라벨 =====
    function drawFrame() {
      if (video.readyState >= video.HAVE_CURRENT_DATA) {
        // 카메라 영상 (좌우 반전)
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        // 최근 검출 결과 그리기
        if (
          latestDetections.length > 0 &&
          performance.now() - lastDetectionAt < KEEP_DETECTION_MS
        ) {
          const fontSize = Math.max(20, Math.round(canvas.width * 0.026));
          const padding = Math.max(6, canvas.width * 0.012);
          const labelHeight = Math.round(fontSize * 1.55);
          ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
          const lineWidth = Math.max(4, canvas.width * 0.005);

          for (const d of latestDetections) {
            const { x, y, w, h } = d.box;

            // 박스
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = lineWidth;
            ctx.lineJoin = "round";
            ctx.strokeRect(x, y, w, h);

            // 라벨: "5H 92%" 형태
            const label = `${d.class}  ${Math.round(d.confidence * 100)}%`;
            const metrics = ctx.measureText(label);
            const labelW = metrics.width + padding * 2;

            // 라벨이 박스 위로 나가면 박스 안쪽 상단에 그림
            const labelY = y - labelHeight >= 0 ? y - labelHeight : y;

            ctx.fillStyle = "#ff0000";
            ctx.fillRect(x, labelY, labelW, labelHeight);

            ctx.fillStyle = "#fff";
            ctx.textBaseline = "middle";
            ctx.fillText(label, x + padding, labelY + labelHeight / 2);
          }
        }
      }
      requestAnimationFrame(drawFrame);
    }

    // ===== 카메라 시작 =====
    function startCamera() {
      return new Promise(async (resolve, reject) => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          reject(new Error("이 브라우저는 카메라 API를 지원하지 않습니다.\nSafari에서 열어주세요."));
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
            audio: false,
          });
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // 검출 canvas는 다운스케일된 정방향
            const scale = DETECT_INPUT_WIDTH / video.videoWidth;
            detectCanvas.width = DETECT_INPUT_WIDTH;
            detectCanvas.height = Math.round(video.videoHeight * scale);

            video
              .play()
              .then(() => {
                drawFrame();
                resolve();
              })
              .catch(reject);
          };
        } catch (err) {
          reject(err);
        }
      });
    }

    // ===== Roboflow API 호출 =====
    async function detectCard() {
      if (isCalling) return;
      if (!apiKey) return;
      if (canvas.width === 0) return;

      isCalling = true;
      const t0 = performance.now();

      try {
        // 정방향 + 다운스케일 — 카드는 좌우 비대칭이라 거울 영상은 모델이 못 알아봄
        detectCtx.drawImage(video, 0, 0, detectCanvas.width, detectCanvas.height);
        const base64 = detectCanvas.toDataURL("image/jpeg", 0.7).split(",")[1];

        setDbg(dbgState, "호출 중", "warn");

        const url = `https://detect.roboflow.com/${ROBOFLOW_MODEL_ID}/${ROBOFLOW_VERSION}?api_key=${encodeURIComponent(apiKey)}`;
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: base64,
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`HTTP ${response.status} ${errText.slice(0, 120)}`);
        }

        const result = await response.json();
        const elapsed = performance.now() - t0;

        // 좌표 변환:
        //   API 좌표 (검출 canvas, 정방향, 다운스케일)
        //   → 표시 canvas (원본 크기, 거울 반전)
        const scaleUp = video.videoWidth / detectCanvas.width;
        const W = canvas.width;

        const detections = (result.predictions || [])
          .filter((p) => p.confidence >= MIN_CONFIDENCE)
          .map((p) => {
            const xMin = (p.x - p.width / 2) * scaleUp;
            const xMax = (p.x + p.width / 2) * scaleUp;
            const yMin = (p.y - p.height / 2) * scaleUp;
            const yMax = (p.y + p.height / 2) * scaleUp;

            // X축 거울 반전
            return {
              class: p.class,
              confidence: p.confidence,
              box: {
                x: W - xMax,
                y: yMin,
                w: xMax - xMin,
                h: yMax - yMin,
              },
            };
          });

        latestDetections = detections;
        lastDetectionAt = performance.now();

        // 디버그 패널
        setDbg(
          dbgState,
          detections.length > 0 ? "검출됨" : "탐색 중",
          detections.length > 0 ? "ok" : "warn"
        );
        setDbg(dbgCount, String(detections.length));
        setDbg(dbgLatency, `${elapsed.toFixed(0)}ms`);
        setDbg(
          dbgClass,
          detections.length > 0
            ? detections.map((d) => d.class).join(", ")
            : "-"
        );

        // 콘솔
        if (detections.length > 0) {
          console.log(
            `🃏 ${detections.length}장 검출 (${elapsed.toFixed(0)}ms):`,
            detections.map((d) => `${d.class} ${(d.confidence * 100).toFixed(0)}%`).join(", ")
          );
          detections.forEach((d) => {
            console.log(
              `  ${d.class} (${(d.confidence * 100).toFixed(1)}%):`,
              `x=${d.box.x.toFixed(0)} y=${d.box.y.toFixed(0)} w=${d.box.w.toFixed(0)} h=${d.box.h.toFixed(0)}`
            );
          });
        }
      } catch (err) {
        console.error("Roboflow API 오류:", err);
        setDbg(dbgState, "오류", "bad");
        setDbg(dbgClass, (err.message || "unknown").slice(0, 30));
      } finally {
        isCalling = false;
      }
    }

    // ===== 초기화 =====
    async function init() {
      try {
        apiKey = loadApiKey();
        if (!apiKey) {
          showStatus("API 키가 입력되지 않았습니다.\n페이지를 새로고침해서 다시 입력해주세요.\n\n콘솔에서 resetApiKey() 호출 시 재입력");
          return;
        }

        setDbg(dbgState, "카메라 시작…", "warn");
        await startCamera();
        hideStatus();
        setDbg(dbgState, "탐색 중", "warn");

        // 검출 루프 시작
        detectTimer = setInterval(detectCard, DETECT_INTERVAL_MS);
      } catch (err) {
        console.error(err);
        let msg = err.message || err.name || "알 수 없는 오류";
        if (err.name === "NotAllowedError") {
          msg = "카메라 권한이 거부되었습니다.\n설정 > Safari > 카메라에서 허용해주세요.";
        } else if (err.name === "NotFoundError") {
          msg = "카메라를 찾을 수 없습니다.";
        } else if (err.name === "NotReadableError") {
          msg = "카메라가 다른 앱에서 사용 중입니다.";
        }
        showStatus(msg);
        setDbg(dbgState, "초기화 실패", "bad");
      }
    }

    init();
  </script>
</body>
</html>
