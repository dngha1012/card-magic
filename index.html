<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <title>Card Magic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #video {
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      pointer-events: none;
      max-width: 80vw;
      white-space: pre-line;
      transition: opacity 0.3s ease;
      z-index: 100;
    }
    #status.hidden {
      opacity: 0;
    }

    /* 디버그 패널 (우상단) — 폰에서 콘솔 못 보니까 화면에 띄움 */
    #debug {
      position: fixed;
      top: calc(env(safe-area-inset-top, 8px) + 8px);
      right: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.5;
      padding: 8px 10px;
      border-radius: 6px;
      pointer-events: none;
      z-index: 90;
      min-width: 140px;
    }
    #debug .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    #debug .label { color: #999; }
    #debug .val { color: #fff; font-weight: 600; }
    #debug .val.ok { color: #4caf50; }
    #debug .val.warn { color: #ffb74d; }
    #debug .val.bad { color: #ff5252; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="status">카메라 준비 중…</div>

  <div id="debug">
    <div class="row"><span class="label">상태</span><span class="val" id="dbg-state">초기화…</span></div>
    <div class="row"><span class="label">컨투어</span><span class="val" id="dbg-contours">-</span></div>
    <div class="row"><span class="label">4각형</span><span class="val" id="dbg-quads">-</span></div>
    <div class="row"><span class="label">최대면적</span><span class="val" id="dbg-area">-</span></div>
    <div class="row"><span class="label">FPS</span><span class="val" id="dbg-fps">-</span></div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const statusEl = document.getElementById("status");
    const dbgState = document.getElementById("dbg-state");
    const dbgContours = document.getElementById("dbg-contours");
    const dbgQuads = document.getElementById("dbg-quads");
    const dbgArea = document.getElementById("dbg-area");
    const dbgFps = document.getElementById("dbg-fps");

    // ===== 상태 =====
    let opencvReady = false;
    let latestQuad = null;
    let lastDetectionAt = 0;
    const KEEP_DETECTION_MS = 400; // 검출 결과를 이 시간 동안 유지 (지글거림 방지)

    // FPS 측정용
    let detectCount = 0;
    let lastFpsAt = performance.now();

    // ===== UI =====
    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }
    function hideStatus() {
      statusEl.classList.add("hidden");
    }
    function setDbg(el, text, cls) {
      el.textContent = text;
      el.classList.remove("ok", "warn", "bad");
      if (cls) el.classList.add(cls);
    }

    // ===== 매 프레임 그리기 (60fps) =====
    function drawFrame() {
      if (video.readyState >= video.HAVE_CURRENT_DATA) {
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        // 최근 검출 결과를 KEEP_DETECTION_MS 동안 유지 — 깜빡임 방지
        if (latestQuad && performance.now() - lastDetectionAt < KEEP_DETECTION_MS) {
          ctx.strokeStyle = "#ff0000";
          ctx.lineWidth = Math.max(4, canvas.width * 0.006);
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(latestQuad[0].x, latestQuad[0].y);
          for (let i = 1; i < latestQuad.length; i++) {
            ctx.lineTo(latestQuad[i].x, latestQuad[i].y);
          }
          ctx.closePath();
          ctx.stroke();
        }
      }
      requestAnimationFrame(drawFrame);
    }

    // ===== 카메라 시작 =====
    function startCamera() {
      return new Promise(async (resolve, reject) => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          reject(new Error("이 브라우저는 카메라 API를 지원하지 않습니다.\nSafari에서 열어주세요."));
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
            audio: false,
          });
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video
              .play()
              .then(() => {
                drawFrame();
                resolve();
              })
              .catch(reject);
          };
        } catch (err) {
          reject(err);
        }
      });
    }

    // ===== OpenCV.js 로드 =====
    function loadOpenCV() {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://docs.opencv.org/4.8.0/opencv.js";
        script.async = true;
        script.onload = () => {
          if (window.cv && window.cv.Mat) {
            resolve();
          } else {
            window.cv["onRuntimeInitialized"] = () => resolve();
          }
        };
        script.onerror = () =>
          reject(new Error("OpenCV.js 로드 실패\n네트워크 연결을 확인해주세요."));
        document.head.appendChild(script);
      });
    }

    // ===== 카드 검출 =====
    function detectCard() {
      if (!opencvReady || canvas.width === 0) return;

      let src, gray, blurred, edges, contours, hierarchy, kernel;
      try {
        src = cv.imread(canvas);
        gray = new cv.Mat();
        blurred = new cv.Mat();
        edges = new cv.Mat();
        contours = new cv.MatVector();
        hierarchy = new cv.Mat();

        // 그레이스케일
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        // [1] 강한 가우시안 블러로 카드 내부 문양(숫자/심볼) 뭉개기
        //     — 약한 블러로는 앞면의 숫자/심볼이 강한 에지로 살아남아
        //     카드 외곽선 대신 내부 사각형이 잡히는 문제가 있음
        cv.GaussianBlur(gray, blurred, new cv.Size(11, 11), 3);
        // 에지 검출
        cv.Canny(blurred, edges, 30, 100);
        // 끊긴 에지를 폐곡선으로 연결
        kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
        cv.dilate(edges, edges, kernel);
        // 외곽선만 추출
        cv.findContours(
          edges,
          contours,
          hierarchy,
          cv.RETR_EXTERNAL,
          cv.CHAIN_APPROX_SIMPLE
        );

        const totalContours = contours.size();
        // [3] 화면의 5% 이상인 컨투어만 카드 후보로 — 노이즈 제거
        const minArea = canvas.width * canvas.height * 0.05;
        let quadCount = 0;
        let bestQuad = null;
        let maxArea = 0;

        // [2] 모든 4각형 후보를 훑되, "가장 큰 것 하나"만 채택
        for (let i = 0; i < totalContours; i++) {
          const cnt = contours.get(i);
          const peri = cv.arcLength(cnt, true);
          const approx = new cv.Mat();
          cv.approxPolyDP(cnt, approx, 0.04 * peri, true);

          if (approx.rows === 4) {
            const area = cv.contourArea(approx);
            if (area > minArea && cv.isContourConvex(approx)) {
              quadCount++;
              if (area > maxArea) {
                maxArea = area;
                const pts = [];
                for (let j = 0; j < 4; j++) {
                  pts.push({
                    x: approx.data32S[j * 2],
                    y: approx.data32S[j * 2 + 1],
                  });
                }
                bestQuad = pts;
              }
            }
          }
          approx.delete();
          cnt.delete();
        }

        // 디버그 패널 업데이트
        setDbg(dbgContours, String(totalContours));
        setDbg(dbgQuads, String(quadCount), quadCount > 0 ? "ok" : "warn");
        setDbg(
          dbgArea,
          bestQuad
            ? `${(maxArea / (canvas.width * canvas.height) * 100).toFixed(1)}%`
            : "-"
        );

        if (bestQuad) {
          latestQuad = bestQuad;
          lastDetectionAt = performance.now();
          setDbg(dbgState, "검출됨", "ok");
          console.log("🃏 카드 모서리 4점:", bestQuad);
        } else {
          setDbg(dbgState, "탐색 중", "warn");
        }

        // FPS 측정 (1초마다 갱신)
        detectCount++;
        const now = performance.now();
        if (now - lastFpsAt >= 1000) {
          const fps = (detectCount * 1000) / (now - lastFpsAt);
          setDbg(dbgFps, fps.toFixed(1));
          detectCount = 0;
          lastFpsAt = now;
        }
      } catch (err) {
        console.error("카드 검출 오류:", err);
        setDbg(dbgState, "오류", "bad");
      } finally {
        if (src) src.delete();
        if (gray) gray.delete();
        if (blurred) blurred.delete();
        if (edges) edges.delete();
        if (contours) contours.delete();
        if (hierarchy) hierarchy.delete();
        if (kernel) kernel.delete();
      }
    }

    // ===== 초기화 =====
    async function init() {
      try {
        setDbg(dbgState, "카메라 시작…");
        await startCamera();
        setDbg(dbgState, "OpenCV 로딩…", "warn");
        showStatus("OpenCV 로딩 중…\n(8MB, 첫 실행 시 시간이 걸려요)");
        await loadOpenCV();
        opencvReady = true;
        setDbg(dbgState, "탐색 중", "warn");
        console.log("OpenCV.js 준비 완료, 카드 검출 시작");
        hideStatus();
        // 5fps 검출 루프
        setInterval(detectCard, 200);
      } catch (err) {
        console.error(err);
        let msg = err.message || err.name || "알 수 없는 오류";
        if (err.name === "NotAllowedError") {
          msg = "카메라 권한이 거부되었습니다.\n설정 > Safari > 카메라에서 허용해주세요.";
        } else if (err.name === "NotFoundError") {
          msg = "카메라를 찾을 수 없습니다.";
        } else if (err.name === "NotReadableError") {
          msg = "카메라가 다른 앱에서 사용 중입니다.";
        }
        showStatus(msg);
        setDbg(dbgState, "초기화 실패", "bad");
      }
    }

    init();
  </script>
</body>
</html>
