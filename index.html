<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <title>Card Magic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* video는 스트림 수신 전용 — 화면 밖으로 숨김 */
    #video {
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* 사용자가 보는 건 canvas */
    #canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      pointer-events: none;
      max-width: 80vw;
      white-space: pre-line;
      transition: opacity 0.3s ease;
    }

    #status.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">카메라 준비 중…</div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    // willReadFrequently: cv.imread가 매 검출마다 canvas를 읽으므로 성능 힌트
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const statusEl = document.getElementById("status");

    // ===== 상태 =====
    let opencvReady = false;
    let latestQuad = null;          // 최근 검출된 카드의 4 모서리 [{x,y}, ...]
    let detectionTimer = null;

    // ===== UI 도우미 =====
    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }
    function hideStatus() {
      statusEl.classList.add("hidden");
    }

    // ===== 매 프레임: video → canvas (거울 모드) + 검출된 박스 그리기 =====
    function drawFrame() {
      if (video.readyState >= video.HAVE_CURRENT_DATA) {
        // 1) 카메라 영상 그리기 (좌우 반전)
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        // 2) 검출된 카드 영역 위에 빨간 박스
        if (latestQuad) {
          ctx.strokeStyle = "#ff0000";
          ctx.lineWidth = Math.max(4, canvas.width * 0.005);
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(latestQuad[0].x, latestQuad[0].y);
          for (let i = 1; i < latestQuad.length; i++) {
            ctx.lineTo(latestQuad[i].x, latestQuad[i].y);
          }
          ctx.closePath();
          ctx.stroke();
        }
      }
      requestAnimationFrame(drawFrame);
    }

    // ===== 카메라 시작 =====
    function startCamera() {
      return new Promise(async (resolve, reject) => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          reject(new Error("이 브라우저는 카메라 API를 지원하지 않습니다.\nSafari에서 열어주세요."));
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
            audio: false,
          });
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            // canvas 내부 해상도 = 비디오 원본 해상도 (검출 정밀도 위해)
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video
              .play()
              .then(() => {
                drawFrame();
                resolve();
              })
              .catch(reject);
          };
        } catch (err) {
          reject(err);
        }
      });
    }

    // ===== OpenCV.js 비동기 로드 =====
    function loadOpenCV() {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://docs.opencv.org/4.8.0/opencv.js";
        script.async = true;
        script.onload = () => {
          // OpenCV.js는 WASM 모듈 초기화가 끝나야 cv.Mat 등이 준비됨
          if (window.cv && window.cv.Mat) {
            resolve();
          } else {
            window.cv["onRuntimeInitialized"] = () => resolve();
          }
        };
        script.onerror = () =>
          reject(new Error("OpenCV.js 로드 실패\n네트워크 연결을 확인해주세요."));
        document.head.appendChild(script);
      });
    }

    // ===== 카드(가장 큰 4각형) 검출 =====
    function detectCard() {
      if (!opencvReady) return;
      if (canvas.width === 0 || canvas.height === 0) return;

      let src, gray, blurred, edges, contours, hierarchy;
      try {
        src = cv.imread(canvas);
        gray = new cv.Mat();
        blurred = new cv.Mat();
        edges = new cv.Mat();
        contours = new cv.MatVector();
        hierarchy = new cv.Mat();

        // 1) 그레이스케일 변환
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        // 2) 잡음 제거 블러
        cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
        // 3) 에지 검출
        cv.Canny(blurred, edges, 50, 150);
        // 4) 외곽선 추출
        cv.findContours(
          edges,
          contours,
          hierarchy,
          cv.RETR_LIST,
          cv.CHAIN_APPROX_SIMPLE
        );

        // 5) 4각형 + 일정 면적 이상 중 가장 큰 것 선택
        let bestQuad = null;
        let maxArea = 0;
        const minArea = canvas.width * canvas.height * 0.03; // 화면의 3% 이상

        for (let i = 0; i < contours.size(); i++) {
          const cnt = contours.get(i);
          const peri = cv.arcLength(cnt, true);
          const approx = new cv.Mat();
          // epsilon 0.02 * 둘레 — 카드처럼 직각인 도형을 4점으로 근사하기에 적당
          cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

          if (approx.rows === 4) {
            const area = cv.contourArea(approx);
            if (area > minArea && area > maxArea) {
              maxArea = area;
              const pts = [];
              for (let j = 0; j < 4; j++) {
                pts.push({
                  x: approx.data32S[j * 2],
                  y: approx.data32S[j * 2 + 1],
                });
              }
              bestQuad = pts;
            }
          }
          approx.delete();
          cnt.delete();
        }

        if (bestQuad) {
          latestQuad = bestQuad;
          // 사용자 요구사항: 네 모서리 좌표 콘솔 출력
          console.log("🃏 카드 모서리 4점:", bestQuad);
        } else {
          latestQuad = null;
        }
      } catch (err) {
        console.error("카드 검출 오류:", err);
      } finally {
        // WASM 메모리 누수 방지 — 사용한 Mat은 반드시 delete
        if (src) src.delete();
        if (gray) gray.delete();
        if (blurred) blurred.delete();
        if (edges) edges.delete();
        if (contours) contours.delete();
        if (hierarchy) hierarchy.delete();
      }
    }

    // ===== 초기화 =====
    async function init() {
      try {
        await startCamera();
        showStatus("OpenCV 로딩 중…\n(8MB, 첫 실행 시 시간이 걸려요)");
        await loadOpenCV();
        opencvReady = true;
        console.log("OpenCV.js 준비 완료, 카드 검출 시작");
        hideStatus();
        // 5fps로 검출 (200ms 간격)
        detectionTimer = setInterval(detectCard, 200);
      } catch (err) {
        console.error(err);
        let msg = err.message || err.name || "알 수 없는 오류";
        if (err.name === "NotAllowedError") {
          msg = "카메라 권한이 거부되었습니다.\n설정 > Safari > 카메라에서 허용해주세요.";
        } else if (err.name === "NotFoundError") {
          msg = "카메라를 찾을 수 없습니다.";
        } else if (err.name === "NotReadableError") {
          msg = "카메라가 다른 앱에서 사용 중입니다.";
        }
        showStatus(msg);
      }
    }

    init();
  </script>
</body>
</html>
